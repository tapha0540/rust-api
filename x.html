<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="h1"></h1>
    <script>
        const h1 = document.getElementById("h1");
        async function x() {
            let res = await fetch("http://localhost:8080/categories");
            console.log(res);
            
            let body = await res.json();
            console.log(body);
            h1.innerHTML = body;
            return body;
        }
        x();
    </script>
</body>

</html>
